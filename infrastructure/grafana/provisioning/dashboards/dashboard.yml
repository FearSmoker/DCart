# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Auto-loads dashboard JSON files from /var/lib/grafana/dashboards on startup.
# =============================================================================

apiVersion: 1

providers:
  - name: "DCart Dashboards"
    orgId: 1
    folder: "DCart"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
