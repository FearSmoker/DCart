# =============================================================================
# DCart Nginx Configuration
# =============================================================================
# Reverse proxy for Next.js frontend and FastAPI AI service.
# Includes gzip, rate limiting, WebSocket support, and security headers.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Rate limiting — 10 requests/second per client IP
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # -------------------------------------------------------------------------
    # Upstream definitions
    # -------------------------------------------------------------------------
    upstream nextjs {
        server nextjs:3000;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    # -------------------------------------------------------------------------
    # WebSocket upgrade map
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # Server block — port 80
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------------
        # Security headers
        # ---------------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---------------------------------------------------------------------
        # Nginx health check endpoint
        # ---------------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ---------------------------------------------------------------------
        # AI Service API routes — proxy to FastAPI
        # ---------------------------------------------------------------------
        location /api/recommendations {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai_service/recommendations;
            include /etc/nginx/proxy_params;
        }

        location /api/copilot {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai_service/copilot;
            include /etc/nginx/proxy_params;
        }

        location /api/agent {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai_service/agent;
            include /etc/nginx/proxy_params;
        }

        location /api/search/visual {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_service/search/visual;
            include /etc/nginx/proxy_params;
        }

        location /api/security {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_service/security;
            include /etc/nginx/proxy_params;
        }

        location /api/pricing {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai_service/pricing;
            include /etc/nginx/proxy_params;
        }

        location /api/forecast {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_service/forecast;
            include /etc/nginx/proxy_params;
        }

        location /api/vendor {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai_service/vendor;
            include /etc/nginx/proxy_params;
        }

        location /api/reviews/analyze {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_service/reviews;
            include /etc/nginx/proxy_params;
        }

        # ---------------------------------------------------------------------
        # Default — proxy everything else to Next.js
        # ---------------------------------------------------------------------
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;

            # WebSocket support (Next.js HMR in dev, real-time features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
