# =============================================================================
# DCart Deploy — Continuous Deployment Pipeline
# =============================================================================
# Triggers on push to main after CI passes.
# Builds Docker images, tags, pushes to registry, and sends deploy notification.
# =============================================================================

name: DCart Deploy

on:
  push:
    branches: [main]

# Ensure only one deploy runs at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # Deploy to production
  # ---------------------------------------------------------------------------
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only deploy if CI workflow has passed (same commit)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image prefix for Docker compatibility
        run: |
          echo "IMAGE_PREFIX=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------
      # Registry login (placeholder — configure with your registry)
      # -----------------------------------------------------------------
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # Generate image tags
      # -----------------------------------------------------------------
      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "tag=${SHA_SHORT}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------
      # Build & push Next.js image
      # -----------------------------------------------------------------
      - name: Build & push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nextjs:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nextjs:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------
      # Build & push AI Service image
      # -----------------------------------------------------------------
      - name: Build & push AI Service image
        uses: docker/build-push-action@v5
        with:
          context: ./recommendation_service
          file: ./recommendation_service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------
      # Build & push Nginx image
      # -----------------------------------------------------------------
      - name: Build & push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./infrastructure/nginx
          file: ./infrastructure/nginx/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------
      # Deploy notification (placeholder)
      # -----------------------------------------------------------------
      - name: Deploy notification
        run: |
          echo "=========================================="
          echo "🚀 DCart Deployment Complete"
          echo "=========================================="
          echo "Commit:    ${{ github.sha }}"
          echo "Tag:       ${{ steps.meta.outputs.tag }}"
          echo "Branch:    ${{ github.ref_name }}"
          echo "Actor:     ${{ github.actor }}"
          echo "=========================================="
          echo ""
          echo "Images pushed:"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nextjs:${{ steps.meta.outputs.tag }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:${{ steps.meta.outputs.tag }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:${{ steps.meta.outputs.tag }}"
          echo ""
          echo "TODO: Add deployment to your hosting platform here."
          echo "  Examples: docker compose pull && docker compose up -d"
          echo "            kubectl set image deployment/..."
          echo "            ssh deploy@server 'cd /app && docker compose pull && docker compose up -d'"
